<div class="relative">
    <!-- Trash Icon Button -->
    <button
      (click)="openDeleteModal()" type="button"
      class="bg-red-600 focus:ring-4 focus:ring-red-300 font-medium rounded-lg text-sm px-5 py-2.5 me-2 mb-2"
    >
        Delete
    </button>
  
    <!-- Modal Overlay -->
    @if(isDeleteModalOpen){
    <div
      class="fixed inset-0 bg-black bg-opacity-50 transition-opacity"
      (click)="closeDeleteModal()"
    ></div>
  
    <!-- Delete Confirmation Modal -->
    <div
      class="fixed inset-x-0 top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-white rounded-lg shadow-lg p-6 w-11/12 max-w-sm"
    >
      <h3 class="text-lg font-semibold text-gray-800 mb-4">Are you sure?</h3>
      <p class="text-sm text-gray-600 mb-6">Do you really want to delete this sneaker? This action cannot be undone.</p>
  
      <div class="flex justify-end space-x-4">
        <button
          (click)="closeDeleteModal()"
          class="px-4 py-2 bg-gray-200 text-gray-800 rounded-md hover:bg-gray-300"
        >
          Cancel
        </button>
        <button
          
          class="px-4 py-2 bg-red-600 rounded-md hover:bg-red-700"
        >
          Delete
        </button>
      </div>
    </div>
    }
  </div>
