<div class="text-xs top-1 text-right pr-2">
    V4.1
</div>

@if (sneakers.length>0) {
    <h1 class="font-bold text-2xl p-4">Sneaker List</h1>
    <h2 class="font-bold text-xl p-4">Active ({{sneakers.length}})</h2>
    <div class="m-2 pb-28" cdkDropList (cdkDropListDropped)="onDrop($event)">
        @for(sneaker of sneakers; track sneaker){
            <div cdkDrag class="mx-4 my-2">
                <div 
                    cdkDragHandle
                    class="bg-blue-600 inline-flex items-center justify-center rounded-full p-2 cursor-grab">
                    <svg width="18px" fill="currentColor" viewBox="0 0 24 24">
                      <path d="M10 9h4V6h3l-5-5-5 5h3v3zm-1 1H6V7l-5 5 5 5v-3h3v-4zm14 2l-5-5v3h-3v4h3v3l5-5zm-9 3h-4v3H7l5 5 5-5h-3v-3z"></path>
                      <path d="M0 0h24v24H0z" fill="none"></path>
                    </svg>
                </div>
                <a [routerLink]="'/sneaker-detail/' + sneaker.id">
                    <app-sneaker-card [sneaker]="sneaker"></app-sneaker-card>
                    <div class="bg-gray-800 border-4 border-dotted rounded-xl
                    border-gray-500 min-h-32" *cdkDragPlaceholder></div>
                </a>
            </div>
        }
    </div>
}
@else {
    <div class="py-8 px-4 mx-auto max-w-screen-xl mt-40 text-center lg:py-16 lg:px-12">
        <h1 class="mb-4 text-2xl font-semibold  ">
            Add your first pair of shoes by clicking '+' button
        </h1>
    </div>
}

<app-reload-page></app-reload-page>
<app-add-sneaker></app-add-sneaker>
