<div class="relative">
    <button
      (click)="openDeleteModal()" type="button"
      class="bg-red-600 focus:ring-4 focus:ring-red-300 font-medium rounded-lg text-sm px-6 py-2.5 me-2 mb-2"
    >
        Delete
    </button>
  
    <!-- Modal Overlay -->
    @if(isDeleteModalOpen){
    <div
      class="fixed inset-0 bg-black bg-opacity-50 transition-opacity"
      (click)="closeDeleteModal()">
    </div>
  
    <!-- Delete Confirmation Modal -->
    <div
      class="fixed inset-x-0 top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-gray-700 rounded-lg shadow-lg p-6 w-11/12 max-w-sm">
            <div class="p-4 md:p-5 text-center">
                <svg class="mx-auto mb-4 w-12 h-12" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 20 20">
                    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 11V6m0 8h.01M19 10a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/>
                </svg>
                <h3 class="mb-5 font-normal">Are you sure you want to delete this Sneaker?</h3>
                <button
                (click)="deleteSneakers()" 
                type="button" class="bg-red-600 hover:bg-red-800 focus:ring-4 focus:outline-none focus:ring-red-800 font-medium rounded-lg text-sm inline-flex items-center px-5 py-2.5 text-center">
                    Yes, I'm sure
                </button>
                <button type="button" (click)="closeDeleteModal()"
                class="py-2.5 px-5 ms-3 text-sm font-medium focus:outline-none rounded-lg border focus:z-10 focus:ring-4 focus:ring-gray-700 bg-gray-800 border-gray-600 hover:text-white hover:bg-gray-700">No, cancel</button>
            </div>
    </div>
    }
  </div>
