<div class="text-xs top-1 text-right pr-2">
    V8.0
</div>

@if (sneakers.length>0) {
    <div class="pb-24">
        <div class="flex p-4 space-x-6">
            <h1 class="font-bold text-2xl">Sneaker List</h1>
            <app-reload-page></app-reload-page>
        </div>

        <app-group-filter (filterChange)="onFilterChange($event)"></app-group-filter>

        <app-sneaker-group
            [sneakers] = "sneakers"
            [activeFilter] ="activeFilter"
        ></app-sneaker-group>

        <div class="pt-8 flex justify-center">
            <button
            (click)="exportData()"
            class="bg-blue-600 whitespace-nowrap hover:bg-blue-800 font-medium rounded-lg text-sm px-3 py-2.5">
                Download Data
            </button>
        </div>
    </div>
}
@else {
    <div class="py-8 px-4 mx-auto max-w-screen-xl mt-40 text-center lg:py-16 lg:px-12">
        <h1 class="mb-4 text-2xl font-semibold">
            Add your first pair of shoes by clicking '+' button
        </h1>
    </div>
}

<app-add-sneaker></app-add-sneaker>
