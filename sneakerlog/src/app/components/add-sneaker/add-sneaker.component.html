<button (click) = "addSneakerModal()" type="button" class="items-center p-2 w-10 h-10 
bg-button rounded-lg hover:bg-button">
      <svg class="w-[24px] h-[24px] text-white" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
          fill="none" viewBox="0 0 24 24">
          <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M5 12h14m-7 7V5" />
      </svg>
</button>

<!-- Main modal -->
@if (isModal){
<div (click)="onBackdropClick($event)" 
class="fixed inset-0 flex items-center justify-center z-50 bg-gray-900 bg-opacity-50">
    <div id="modal-content" 
    class="relative p-4 w-full max-w-md max-h-full bg-gray-700 rounded-lg shadow-lg">
        <!-- Modal content -->
        <div class="relative">
            <!-- Modal header -->
            <div class="flex items-center justify-between p-4 md:p-5 border-b rounded-t">
                <h3 class="text-lg font-semibold text-white">
                    Add new shoes
                </h3>
                <button (click)="closeModal()" type="button" 
                class="text-white bg-transparent rounded-lg text-sm w-8 h-8 
                ms-auto inline-flex justify-center items-center 
                hover:bg-gray-600 hover:text-white">
                    <svg class="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14">
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/>
                    </svg>
                    <span class="sr-only">Close modal</span>
                </button>
            </div>
            <!-- Modal body -->
            <form class="p-4 md:p-5">
                <div class="grid gap-4 mb-4 grid-cols-2">
                    <div class="col-span-2 sm:col-span-1">
                        <label for="brand" 
                        class="block mb-2 text-sm font-medium text-white">
                            Brand
                        </label>
                        <select id="brand" class="border text-sm rounded-lg block w-full p-2.5 
                        bg-gray-600 border-gray-500 focus:border-blue-500 text-white" required="">
                            <option *ngFor="let brand of brands" [value]="brand.value" >
                                {{ brand.label }}
                            </option>
                        </select>
                    </div>
                    <div class="col-span-2 sm:col-span-1">
                        <label for="Model" class="block mb-2 text-sm font-medium text-white">
                           Model
                        </label>
                        <input name="model" id="model" class="border text-sm rounded-lg block w-full p-2.5 
                        bg-gray-600 border-gray-500  text-white" 
                         placeholder="Model name" required="">
                    </div>
                    <div class="col-span-2 sm:col-span-1">
                        <label for="purchased-price" class="block mb-2 text-sm font-medium text-white">
                           Purchased Price
                        </label>
                        <input name="purchased-price" id="purchased-price" class="border text-sm rounded-lg block w-full p-2.5 
                        bg-gray-600 border-gray-500  text-white" 
                         placeholder="Purchased price" required="">
                    </div>
                    <div class="col-span-2 sm:col-span-1">
                        <label for="purchased-date" class="block mb-2 text-sm font-medium text-white">
                           Purchased Date
                        </label>
                        <input type="date" name="purchased-date" id="purchased-date" class="border text-sm rounded-lg block w-full p-2.5 
                        bg-gray-600 border-gray-500  text-white" 
                         placeholder="Purchased date">
                    </div>
                    <div class="col-span-2 sm:col-span-1">
                        <label for="current-distance" class="block mb-2 text-sm font-medium text-white">
                           Current Distance (KM)
                        </label>
                        <input type="number" name="current-distance" id="current-distance" class="border text-sm rounded-lg block w-full p-2.5 
                        bg-gray-600 border-gray-500  text-white" 
                         placeholder="0KM">
                    </div>
                    <div class="col-span-2 sm:col-span-1">
                        <label for="target-distance" class="block mb-2 text-sm font-medium text-white">
                           Target Distance (KM)
                        </label>
                        <input type="number" name="target-distance" id="target-distance" class="border text-sm rounded-lg block w-full p-2.5 
                        bg-gray-600 border-gray-500  text-white" 
                         placeholder="~300KM">
                    </div>
                    <div class="col-span-2 sm:col-span-1">
                        <label for="usage-count" class="block mb-2 text-sm font-medium text-white">
                           Usage Count
                        </label>
                        <input type="number" name="usage-count" id="usage-count" class="border text-sm rounded-lg block w-full p-2.5 
                        bg-gray-600 border-gray-500  text-white" 
                         placeholder="The estimated value based on usage distance">
                    </div>
                    <div class="col-span-2 sm:col-span-1 text-white">
                        Estimated Current Price
                    </div>
                </div>
                <button type="submit" class="text-white inline-flex items-center
                 bg-button hover:bg-button font-medium rounded-lg text-sm px-5 py-2.5 text-center">
                    <svg class="me-1 -ms-1 w-5 h-5" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M10 5a1 1 0 011 1v3h3a1 1 0 110 2h-3v3a1 1 0 11-2 0v-3H6a1 1 0 110-2h3V6a1 1 0 011-1z" clip-rule="evenodd"></path></svg>
                    Add new shoes
                </button>
            </form>
        </div>
    </div>
</div> 
}
