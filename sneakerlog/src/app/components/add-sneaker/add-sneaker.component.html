
<!-- Main modal -->
@if (isModal){
<div (click)="onBackdropClick($event)" 
class="max-w-sm mx-auto fixed inset-0 flex items-center justify-center z-50 bg-gray-900 bg-opacity-50">
    <div id="modal-content" 
    class="relative p-2 w-full max-w-sm max-h-full bg-gray-700 rounded-lg shadow-lg">
        <!-- Modal content -->
        <div class="relative">
            <!-- Modal header -->
            <div class="flex items-center justify-between p-2 md:p-5 rounded-t">
                <button (click)="closeModal()" type="button" 
                class="  bg-transparent rounded-lg text-sm w-4 h-4 
                ms-auto inline-flex justify-center items-center 
                hover:bg-gray-600 hover: ">
                    <svg class="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14">
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/>
                    </svg>
                </button>
            </div>
            <!-- Modal body -->
            <form [formGroup]="sneakerForm" (ngSubmit)="submitForm()" class="p-4 md:p-5">
                <div class="grid gap-4 mb-4 grid-cols-2">
                    <div class="col-span-2 sm:col-span-1">
                        <label for="brand" 
                        class="block mb-2 text-sm font-medium  ">
                            Brand
                        </label>
                        <select formControlName="brand" id="brand" class="border text-sm rounded-lg block w-full p-2.5 
                        bg-gray-600 border-gray-500 focus:border-blue-500  " required>
                            <option *ngFor="let brand of brands" [value]="brand.value" >
                                {{ brand.label }}
                            </option>
                        </select>
                    </div>
                    <div class="col-span-2 sm:col-span-1">
                        <label for="Model" class="block mb-2 text-sm font-medium  ">
                           Model
                        </label>
                        <input formControlName="model" name="model" id="model" class="border text-sm rounded-lg block w-full p-2.5 
                        bg-gray-600 border-gray-500   " 
                         placeholder="Model name" required>
                    </div>
                    <div type="number" class="col-span-2 sm:col-span-1">
                        <label for="purchased-price" class="block mb-2 text-sm font-medium  ">
                           Purchased Price
                        </label>
                        <input formControlName="purchasedPrice" name="purchased-price" id="purchased-price" class="border text-sm rounded-lg block w-full p-2.5 
                        bg-gray-600 border-gray-500   " 
                         placeholder="Purchased price" required="">
                    </div>
                    <div class="col-span-2 sm:col-span-1">
                        <label for="purchased-date" class="block mb-2 text-sm font-medium  ">
                           Purchased Date
                        </label>
                        <input formControlName="purchasedDate" type="date" name="purchased-date" id="purchased-date" class="border text-sm rounded-lg block w-full p-2.5 
                        bg-gray-600 border-gray-500   " 
                         placeholder="Purchased date">
                    </div>
                    <div class="col-span-2 sm:col-span-1">
                        <label for="current-distance" class="block mb-2 text-sm font-medium  ">
                           Current Distance (KM)
                        </label>
                        <input type="number" formControlName="currentDistance" name="current-distance" id="current-distance" class="border text-sm rounded-lg block w-full p-2.5 
                        bg-gray-600 border-gray-500   " 
                         placeholder="0KM">
                    </div>
                    <div class="col-span-2 sm:col-span-1">
                        <label for="target-distance" class="block mb-2 text-sm font-medium  ">
                           Target Distance (KM)
                        </label>
                        <input type="number" formControlName="targetDistance" name="target-distance" id="target-distance" class="border text-sm rounded-lg block w-full p-2.5 
                        bg-gray-600 border-gray-500   " 
                         placeholder="~300KM">
                    </div>
                    <div class="col-span-2 sm:col-span-1">
                        <label for="usage-count" class="block mb-2 text-sm font-medium  ">
                           Usage Count
                        </label>
                        <input type="number" formControlName="usageCount" name="usage-count" id="usage-count" class="border text-sm rounded-lg block w-full p-2.5 
                        bg-gray-600 border-gray-500   " 
                         placeholder="The estimated value based on usage distance">
                    </div>
                    <div class="col-span-2 sm:col-span-1  ">
                        Estimated Current Price
                    </div>
                </div>
                <button type="submit" class="  inline-flex items-center
                 bg-button hover:bg-button font-medium rounded-lg text-sm px-5 py-2.5 text-center">
                    <svg class="me-1 -ms-1 w-5 h-5" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M10 5a1 1 0 011 1v3h3a1 1 0 110 2h-3v3a1 1 0 11-2 0v-3H6a1 1 0 110-2h3V6a1 1 0 011-1z" clip-rule="evenodd"></path></svg>
                    Add new shoes
                </button>
            </form>
        </div>
    </div>
</div> 
}
