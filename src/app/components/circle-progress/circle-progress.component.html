<div class="relative size-40 w-full">
    <svg class="size-full -rotate-90" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
      <!-- Background Circle -->
      <circle
        cx="18"
        cy="18"
        r="16"
        fill="none"
        class="stroke-current text-gray-300"
        stroke-width="3"
      ></circle>
      <!-- Progress Circle -->
      <circle
        cx="18"
        cy="18"
        r="16"
        fill="none"
        class="stroke-current text-blue-500"
        stroke-width="3"
        stroke-dasharray="100"
        [attr.stroke-dashoffset]="100 - percentage"
        stroke-linecap="round"
      ></circle>
    </svg>
    <div class="absolute top-1/2 left-1/2 transform -translate-y-1/2 -translate-x-1/2">
      <span class="text-center text-2xl font-bold">{{ percentage }}%</span>
    </div>
    <ng-content></ng-content>
  </div>
